<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Pub Trivia - .NET Edition</title>
    <!-- Local Assets for Offline Capability -->
    <link rel="stylesheet" href="lib/poppins/poppins.css">
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
    <style>
        :root {
            --bg-color: #fde047; /* Bright Yellow */
            --card-bg: #ffffff;
            --accent-primary: #ef4444; /* Hot Red */
            --accent-secondary: #3b82f6; /* Electric Blue */
            --text-main: #000000;
            --text-muted: #1f2937;
            --danger: #ef4444;
            --warning: #f97316;
            --border-width: 3px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#000000 1px, transparent 1px);
            background-size: 15px 15px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            width: 100vw;
            height: 100vh;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Sidebar Leaderboard */
        #leaderboard {
            background: #60a5fa;
            padding: 15px;
            border: var(--border-width) solid #000;
            box-shadow: 6px 6px 0px #000;
            display: flex;
            flex-direction: column;
            transform: rotate(-0.5deg);
            max-height: 100%;
        }

        #leaderboard h3 {
            margin: 0 0 10px 0;
            background: #ffffff;
            padding: 5px;
            border: 2px solid #000;
            display: block;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .score-list-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #fff;
            border: 2px solid #000;
            padding: 5px;
        }

        #score-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 2px solid #000;
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* Main Quiz Area */
        .quiz-area {
            background: var(--card-bg);
            padding: 20px;
            border: var(--border-width) solid #000;
            box-shadow: 10px 10px 0px #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            -webkit-text-stroke: 2px #000;
            text-shadow: 3px 3px 0px #ef4444;
            transform: skew(-3deg);
        }

        .subtitle {
            background: #000;
            color: #fff;
            padding: 2px 12px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
            width: 100%;
            max-width: 300px;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            background: #fff;
            border: var(--border-width) solid #000;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 4px 4px 0px #000;
            box-sizing: border-box;
        }

        #game-area {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        #timer {
            display: inline-block;
            background: #f97316;
            color: #fff;
            padding: 5px 15px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 3px 3px 0px #000;
            margin-bottom: 10px;
        }

        #question-text {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 15px;
            padding: 15px;
            background: #fff;
            border: 3px solid #000;
            box-shadow: 5px 5px 0px #3b82f6;
            max-height: 120px;
            overflow-y: auto;
        }

        #options-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #000;
            color: #000;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px #000;
            background: #fde047;
        }

        .option-letter {
            background: #000;
            color: #fff;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        #feedback {
            margin-top: 15px;
            font-weight: 900;
            padding: 8px;
            border: 2px solid #000;
            text-transform: uppercase;
            font-size: 1rem;
            background: #fff;
            box-shadow: 4px 4px 0px #000;
        }

        .admin-section {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .admin-btn {
            background: #ef4444;
            border: 2px solid #000;
            color: #fff;
            padding: 5px 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            font-size: 0.75rem;
        }

        #winners-display h2 {
            font-size: 2.5rem;
            -webkit-text-stroke: 2px #000;
            text-shadow: 4px 4px 0px #fbbf24;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        
        #podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            height: 180px;
            margin: 20px 0;
        }

        .podium-item {
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            box-shadow: 6px 6px 0px #000;
            position: relative;
        }

        .podium-rank {
            position: absolute;
            top: -15px;
            background: #000;
            color: #fff;
            font-weight: 900;
            padding: 2px 10px;
            transform: rotate(-5deg);
            border: 2px solid #fff;
        }

        .rank-1 { background: #fbbf24; height: 100%; width: 120px; z-index: 3; }
        .rank-2 { background: #94a3b8; height: 80%; width: 100px; z-index: 2; }
        .rank-3 { background: #d97706; height: 60%; width: 100px; z-index: 1; }

        .winner-name {
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-top: 15px;
            word-break: break-all;
        }

        .winner-score {
            background: #fff;
            border: 2px solid #000;
            padding: 2px 8px;
            font-weight: 800;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .podium-icon {
            font-size: 1.5rem;
            margin-top: 5px;
            -webkit-text-stroke: 1px #000;
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            #leaderboard { display: none; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <div id="leaderboard">
            <h3><i class="fas fa-trophy"></i> Leaderboard</h3>
            <div class="score-list-container">
                <ul id="score-list">
                    <li style="color: var(--text-muted); font-style: italic;">No players yet...</li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="quiz-area">
            <h1><i class="fas fa-beer"></i> Friday Pub Trivia</h1>
            <div class="subtitle">
                <span><i class="fas fa-bolt"></i> Real-time Pub Experience</span>
            </div>

            <div class="input-group">
                <input type="text" id="username" placeholder="Your display name..." />
            </div>
            
            <div id="game-area">
                <h2 id="status-msg">Waiting for the Game Master...</h2>

                <div id="winners-display" style="display:none;" class="fade-in">
                    <h2 style="color: var(--warning);"><i class="fas fa-crown"></i> Quiz Winners <i class="fas fa-crown"></i></h2>
                    <div id="podium" style="display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 30px 0; height: 200px;">
                        <!-- Podium items will be injected here -->
                    </div>
                </div>

                <div id="question-area" style="display:none;" class="fade-in">

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <div id="question-counter" style="font-weight: 600; color: var(--accent-primary); font-size: 0.9rem;">
                            <i class="fas fa-list-ol"></i> Question <span id="current-q">0</span> of <span id="total-q">15</span>
                        </div>
                        <div id="timer">
                            <i class="fas fa-clock fa-spin"></i>
                            <span id="seconds">--</span>s
                        </div>
                    </div>
                    <h3 id="question-text"></h3>
                    <div id="options-area"></div>
                    <div id="feedback"></div>
                </div>
            </div>

            <div class="admin-section">
                <button onclick="startNewGame()" class="admin-btn">New Quiz</button>
                <button onclick="nextQuestion()" class="admin-btn">Skip</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestionId = null;
        let localRemainingSeconds = 0;
        let timerInterval = null;
        let socket = null;
        let authStatus = { authEnabled: false, name: null, isAdmin: true };

        async function fetchAuthStatus() {
            try {
                const res = await fetch('/api/auth/status');
                authStatus = await res.json();
                
                const usernameInput = document.getElementById('username');
                if (authStatus.authEnabled) {
                    if (authStatus.name) {
                        usernameInput.value = authStatus.name;
                    }
                    usernameInput.disabled = true;
                    usernameInput.placeholder = authStatus.name || "Authenticated";
                }

                const adminSection = document.querySelector('.admin-section');
                if (!authStatus.isAdmin) {
                    adminSection.style.display = 'none';
                } else {
                    adminSection.style.display = 'flex';
                }
            } catch (err) {
                console.error("Failed to fetch auth status:", err);
            }
        }

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUri = `${protocol}//${window.location.host}/ws`;
            
            socket = new WebSocket(wsUri);

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateUI(data);
            };

            socket.onclose = () => {
                console.log("WebSocket closed. Reconnecting in 2s...");
                setTimeout(initWebSocket, 2000);
            };

            socket.onerror = (err) => {
                console.error("WebSocket error:", err);
                socket.close();
            };
        }

        function updateUI(data) {
            const scoreList = document.getElementById('score-list');
            const statusMsg = document.getElementById('status-msg');
            const questionArea = document.getElementById('question-area');
            const optionsArea = document.getElementById('options-area');

            if (data.leaderboard && data.leaderboard.length > 0) {
                scoreList.innerHTML = data.leaderboard.map((p, idx) => `
                    <li>
                        <span>${idx + 1}. <b>${p.username}</b></span>
                        <span style="color: var(--accent-secondary)">${p.score}</span>
                    </li>
                `).join('');
            } else {
                scoreList.innerHTML = '<li style="color: var(--text-muted); font-style: italic;">No players yet...</li>';
            }

            if (data.status === 'waiting') {
                statusMsg.style.display = 'block';
                statusMsg.innerText = data.message;
                questionArea.style.display = 'none';
                document.getElementById('winners-display').style.display = 'none';
                currentQuestionId = null;
                if (timerInterval) clearInterval(timerInterval);
            } else if (data.status === 'finished') {
                statusMsg.style.display = 'none';
                questionArea.style.display = 'none';
                const winnersDisplay = document.getElementById('winners-display');
                const podium = document.getElementById('podium');
                winnersDisplay.style.display = 'block';
                
                if (data.leaderboard && data.leaderboard.length > 0) {
                    const top3 = data.leaderboard.slice(0, 3);
                    const podiumItems = [];
                    
                    if (top3[1]) podiumItems.push(`
                        <div class="podium-item rank-2">
                            <span class="podium-rank">2nd</span>
                            <i class="fas fa-medal podium-icon" style="color: #e2e8f0;"></i>
                            <span class="winner-name">${top3[1].username}</span>
                            <span class="winner-score">${top3[1].score} PTS</span>
                        </div>
                    `);
                    
                    podiumItems.push(`
                        <div class="podium-item rank-1">
                            <span class="podium-rank">1st</span>
                            <i class="fas fa-trophy podium-icon" style="color: #fff;"></i>
                            <span class="winner-name">${top3[0].username}</span>
                            <span class="winner-score">${top3[0].score} PTS</span>
                        </div>
                    `);
                    
                    if (top3[2]) podiumItems.push(`
                        <div class="podium-item rank-3">
                            <span class="podium-rank">3rd</span>
                            <i class="fas fa-medal podium-icon" style="color: #b45309;"></i>
                            <span class="winner-name">${top3[2].username}</span>
                            <span class="winner-score">${top3[2].score} PTS</span>
                        </div>
                    `);
                    
                    podium.innerHTML = podiumItems.join('');
                } else {
                    podium.innerHTML = "<p>No scores submitted!</p>";
                }
                
                currentQuestionId = null;
                if (timerInterval) clearInterval(timerInterval);
            } else if (data.status === 'active') {
                statusMsg.style.display = 'none';
                document.getElementById('winners-display').style.display = 'none';
                questionArea.style.display = 'block';
                document.getElementById('current-q').innerText = data.current_question_number;
                document.getElementById('total-q').innerText = data.total_questions;
                
                if (Math.abs(localRemainingSeconds - data.remaining_seconds) > 1 || currentQuestionId !== data.question_id) {
                    startLocalTimer(data.remaining_seconds);
                }
                
                if (currentQuestionId !== data.question_id) {
                    currentQuestionId = data.question_id;
                    document.getElementById('question-text').innerText = data.question;
                    document.getElementById('feedback').innerText = "";
                    document.getElementById('feedback').style.background = "transparent";
                    
                    optionsArea.innerHTML = data.options.map(opt => {
                        const letter = opt.charAt(0);
                        const text = opt.substring(3);
                        return `<button class="option-btn" onclick="submitAnswer('${letter}')"><span class="option-letter">${letter}</span><span>${text}</span></button>`;
                    }).join('');
                }
            }
        }

        function startLocalTimer(seconds) {
            localRemainingSeconds = seconds;
            document.getElementById('seconds').innerText = localRemainingSeconds;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (localRemainingSeconds > 0) {
                    localRemainingSeconds--;
                    document.getElementById('seconds').innerText = localRemainingSeconds;
                }
            }, 1000);
        }

        async function submitAnswer(letter) {
            let username = document.getElementById('username').value;
            if (authStatus.authEnabled && authStatus.name) {
                username = authStatus.name;
            }

            if (!username) { alert("Enter name!"); return; }
            const feedback = document.getElementById('feedback');
            const res = await fetch('/api/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: username, Answer: letter })
            });
            const data = await res.json();
            if (res.ok) {
                feedback.innerText = data.result;
                feedback.style.background = data.result.includes("Correct") ? "rgba(16, 185, 129, 0.15)" : "rgba(239, 68, 68, 0.15)";
                document.getElementById('options-area').innerHTML = ""; 
            }
        }

        async function startNewGame() { await fetch('/api/admin/start', { method: 'POST' }); }
        async function nextQuestion() { await fetch('/api/admin/next', { method: 'POST' }); }

        fetchAuthStatus();
        initWebSocket();
    </script>
</body>
</html>
