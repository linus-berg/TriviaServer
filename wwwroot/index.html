<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Pub Trivia - .NET Edition</title>
    <!-- Local Assets for Offline Capability -->
    <link rel="stylesheet" href="lib/poppins/poppins.css">
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #6366f1;
            --accent-secondary: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden; /* No scrolling */
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Sidebar Leaderboard */
        #leaderboard {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        #leaderboard h3 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--warning);
            font-size: 1.2rem;
        }

        .score-list-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        #score-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #score-list li {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid #334155;
            font-size: 0.9rem;
        }

        #score-list li:last-child { border-bottom: none; }

        /* Main Quiz Area */
        .quiz-area {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
            max-width: 350px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 10px 10px 45px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        #question-area {
            width: 100%;
            max-width: 700px;
        }

        #timer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            padding: 6px 14px;
            border-radius: 9999px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        #question-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            min-height: 70px;
        }

        #options-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .option-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .option-btn:hover { background: #475569; transform: translateY(-2px); }

        .option-letter {
            background: var(--accent-primary);
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-size: 0.75rem;
        }

        #feedback {
            margin-top: 15px;
            font-weight: 600;
            padding: 8px;
            border-radius: 8px;
            min-height: 24px;
        }

        .admin-section {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .admin-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            #leaderboard { display: none; } /* Hide sidebar on mobile for simplicity */
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Sidebar -->
        <div id="leaderboard">
            <h3><i class="fas fa-trophy"></i> Leaderboard</h3>
            <div class="score-list-container">
                <ul id="score-list">
                    <li style="color: var(--text-muted); font-style: italic;">No players yet...</li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="quiz-area">
            <h1><i class="fas fa-beer"></i> Friday Pub Trivia</h1>
            <div class="subtitle">
                <span><i class="fab fa-microsoft"></i> .NET 8</span>
                <span>•</span>
                <span><i class="fas fa-bolt"></i> Real-time</span>
            </div>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Your display name..." />
            </div>
            
            <div id="game-area">
                <h2 id="status-msg">Waiting for the Game Master...</h2>

                <div id="winners-display" style="display:none;" class="fade-in">
                    <h2 style="color: var(--warning);"><i class="fas fa-crown"></i> Quiz Winners <i class="fas fa-crown"></i></h2>
                    <div id="podium" style="display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 30px 0; height: 200px;">
                        <!-- Podium items will be injected here -->
                    </div>
                </div>

                <div id="question-area" style="display:none;" class="fade-in">

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <div id="question-counter" style="font-weight: 600; color: var(--accent-primary); font-size: 0.9rem;">
                            <i class="fas fa-list-ol"></i> Question <span id="current-q">0</span> of <span id="total-q">15</span>
                        </div>
                        <div id="timer">
                            <i class="fas fa-clock fa-spin"></i>
                            <span id="seconds">--</span>s
                        </div>
                    </div>
                    <h3 id="question-text"></h3>
                    <div id="options-area"></div>
                    <div id="feedback"></div>
                </div>
            </div>

            <div class="admin-section">
                <button onclick="startNewGame()" class="admin-btn">New Quiz</button>
                <button onclick="nextQuestion()" class="admin-btn">Skip</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestionId = null;
        let localRemainingSeconds = 0;
        let timerInterval = null;
        let socket = null;

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUri = `${protocol}//${window.location.host}/ws`;
            
            socket = new WebSocket(wsUri);

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateUI(data);
            };

            socket.onclose = () => {
                console.log("WebSocket closed. Reconnecting in 2s...");
                setTimeout(initWebSocket, 2000);
            };

            socket.onerror = (err) => {
                console.error("WebSocket error:", err);
                socket.close();
            };
        }

        function updateUI(data) {
            const scoreList = document.getElementById('score-list');
            const statusMsg = document.getElementById('status-msg');
            const questionArea = document.getElementById('question-area');
            const optionsArea = document.getElementById('options-area');

            if (data.leaderboard && data.leaderboard.length > 0) {
                scoreList.innerHTML = data.leaderboard.map((p, idx) => `
                    <li>
                        <span>${idx + 1}. <b>${p.username}</b></span>
                        <span style="color: var(--accent-secondary)">${p.score}</span>
                    </li>
                `).join('');
            } else {
                scoreList.innerHTML = '<li style="color: var(--text-muted); font-style: italic;">No players yet...</li>';
            }

            if (data.status === 'waiting') {
                statusMsg.style.display = 'block';
                statusMsg.innerText = data.message;
                questionArea.style.display = 'none';
                document.getElementById('winners-display').style.display = 'none';
                currentQuestionId = null;
                if (timerInterval) clearInterval(timerInterval);
            } else if (data.status === 'finished') {
                statusMsg.style.display = 'none';
                questionArea.style.display = 'none';
                const winnersDisplay = document.getElementById('winners-display');
                const podium = document.getElementById('podium');
                winnersDisplay.style.display = 'block';
                
                if (data.leaderboard && data.leaderboard.length > 0) {
                    const top3 = data.leaderboard.slice(0, 3);
                    const podiumItems = [];
                    
                    if (top3[1]) podiumItems.push(`
                        <div style="flex: 1; background: #94a3b8; height: 120px; border-radius: 12px 12px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; color: #0f172a;">
                            <i class="fas fa-medal" style="font-size: 2rem; color: #e2e8f0;"></i>
                            <span style="font-weight: 700;">${top3[1].username}</span>
                            <span style="font-size: 0.8rem;">${top3[1].score} pts</span>
                        </div>
                    `);
                    
                    podiumItems.push(`
                        <div style="flex: 1.2; background: #fbbf24; height: 160px; border-radius: 12px 12px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; color: #0f172a; border: 4px solid #fde68a;">
                            <i class="fas fa-trophy" style="font-size: 2.5rem; color: #f59e0b;"></i>
                            <span style="font-weight: 700;">${top3[0].username}</span>
                            <span style="font-size: 0.8rem;">${top3[0].score} pts</span>
                        </div>
                    `);
                    
                    if (top3[2]) podiumItems.push(`
                        <div style="flex: 1; background: #d97706; height: 90px; border-radius: 12px 12px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; color: #0f172a;">
                            <i class="fas fa-medal" style="font-size: 1.5rem; color: #b45309;"></i>
                            <span style="font-weight: 700;">${top3[2].username}</span>
                            <span style="font-size: 0.8rem;">${top3[2].score} pts</span>
                        </div>
                    `);
                    
                    podium.innerHTML = podiumItems.join('');
                } else {
                    podium.innerHTML = "<p>No scores submitted!</p>";
                }
                
                currentQuestionId = null;
                if (timerInterval) clearInterval(timerInterval);
            } else if (data.status === 'active') {
                statusMsg.style.display = 'none';
                document.getElementById('winners-display').style.display = 'none';
                questionArea.style.display = 'block';
                document.getElementById('current-q').innerText = data.current_question_number;
                document.getElementById('total-q').innerText = data.total_questions;
                
                if (Math.abs(localRemainingSeconds - data.remaining_seconds) > 1 || currentQuestionId !== data.question_id) {
                    startLocalTimer(data.remaining_seconds);
                }
                
                if (currentQuestionId !== data.question_id) {
                    currentQuestionId = data.question_id;
                    document.getElementById('question-text').innerText = data.question;
                    document.getElementById('feedback').innerText = "";
                    document.getElementById('feedback').style.background = "transparent";
                    
                    optionsArea.innerHTML = data.options.map(opt => {
                        const letter = opt.charAt(0);
                        const text = opt.substring(3);
                        return `<button class="option-btn" onclick="submitAnswer('${letter}')"><span class="option-letter">${letter}</span><span>${text}</span></button>`;
                    }).join('');
                }
            }
        }

        function startLocalTimer(seconds) {
            localRemainingSeconds = seconds;
            document.getElementById('seconds').innerText = localRemainingSeconds;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (localRemainingSeconds > 0) {
                    localRemainingSeconds--;
                    document.getElementById('seconds').innerText = localRemainingSeconds;
                }
            }, 1000);
        }

        async function submitAnswer(letter) {
            const username = document.getElementById('username').value;
            if (!username) { alert("Enter name!"); return; }
            const feedback = document.getElementById('feedback');
            const res = await fetch('/api/answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Username: username, Answer: letter })
            });
            const data = await res.json();
            if (res.ok) {
                feedback.innerText = data.result;
                feedback.style.background = data.result.includes("Correct") ? "rgba(16, 185, 129, 0.15)" : "rgba(239, 68, 68, 0.15)";
                document.getElementById('options-area').innerHTML = ""; 
            }
        }

        async function startNewGame() { await fetch('/api/admin/start', { method: 'POST' }); }
        async function nextQuestion() { await fetch('/api/admin/next', { method: 'POST' }); }

        initWebSocket();
    </script>
</body>
</html>
